<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" href="assets/ESCUDO_MUNI.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <span>Iniciando sistema...</span>
    </div>
  </div>

  <!-- Chart.js async -->
  <script>
    window.chartReady=false;
    var _cs=document.createElement('script');
    _cs.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
    _cs.onload=function(){window.chartReady=true;};
    _cs.onerror=function(){window.chartReady=false;};
    document.head.appendChild(_cs);
  </script>

  <!-- App scripts en orden -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
